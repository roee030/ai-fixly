<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 520" direction="rtl">
  <rect width="280" height="520" fill="#0F0F1A"/>

  <!-- Top nav -->
  <rect x="0" y="0" width="280" height="44" fill="#141421"/>
  <text x="260" y="28" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="14" font-weight="700">📊 לוח בקרה</text>

  <!-- Tab strip -->
  <rect x="0" y="44" width="280" height="36" fill="#0F0F1A"/>
  <rect x="14" y="52" width="60" height="20" rx="10" fill="rgba(99,102,241,0.2)"/>
  <text x="44" y="66" text-anchor="middle" fill="#6366F1" font-family="system-ui" font-size="10" font-weight="700">סקירה</text>
  <rect x="80" y="52" width="56" height="20" rx="10" fill="#191926"/>
  <text x="108" y="66" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="10">בקשות</text>
  <rect x="142" y="52" width="50" height="20" rx="10" fill="#191926"/>
  <text x="167" y="66" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="10">משפך</text>
  <rect x="198" y="52" width="50" height="20" rx="10" fill="#191926"/>
  <text x="223" y="66" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="10">ספקים</text>

  <!-- Filter row -->
  <rect x="14" y="92" width="66" height="24" rx="6" fill="#6366F1"/>
  <text x="47" y="108" text-anchor="middle" fill="#FFF" font-family="system-ui" font-size="10" font-weight="700">30 ימים</text>
  <rect x="86" y="92" width="66" height="24" rx="6" fill="#191926"/>
  <text x="119" y="108" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="10">90 ימים</text>
  <rect x="158" y="92" width="108" height="24" rx="6" fill="#191926" stroke="#2D2D40"/>
  <text x="212" y="108" text-anchor="middle" fill="#E5E7EB" font-family="system-ui" font-size="10">📍 חדרה</text>

  <!-- Chart 1: Requests per day (line) -->
  <rect x="14" y="130" width="252" height="90" rx="10" fill="#191926"/>
  <text x="258" y="148" text-anchor="end" fill="#E5E7EB" font-family="system-ui" font-size="11" font-weight="700">בקשות ליום</text>
  <text x="22" y="148" fill="#6366F1" font-family="system-ui" font-size="12" font-weight="700">8</text>
  <polyline points="24,200 50,188 76,196 102,176 128,184 154,168 180,172 206,160 232,156 258,164" fill="none" stroke="#6366F1" stroke-width="2"/>
  <circle cx="258" cy="164" r="3" fill="#6366F1"/>
  <line x1="22" y1="210" x2="258" y2="210" stroke="#2D2D40" stroke-width="1"/>

  <!-- Chart 2: Revenue (bars) -->
  <rect x="14" y="230" width="252" height="90" rx="10" fill="#191926"/>
  <text x="258" y="248" text-anchor="end" fill="#E5E7EB" font-family="system-ui" font-size="11" font-weight="700">הכנסות ברוטו</text>
  <text x="22" y="248" fill="#22C55E" font-family="system-ui" font-size="11" font-weight="700">₪12,450</text>
  <g fill="#22C55E">
    <rect x="24" y="290" width="14" height="18"/>
    <rect x="42" y="278" width="14" height="30"/>
    <rect x="60" y="284" width="14" height="24"/>
    <rect x="78" y="270" width="14" height="38"/>
    <rect x="96" y="272" width="14" height="36"/>
    <rect x="114" y="258" width="14" height="50"/>
    <rect x="132" y="260" width="14" height="48"/>
    <rect x="150" y="248" width="14" height="60"/>
    <rect x="168" y="254" width="14" height="54"/>
    <rect x="186" y="246" width="14" height="62"/>
    <rect x="204" y="240" width="14" height="68"/>
    <rect x="222" y="244" width="14" height="64"/>
    <rect x="240" y="236" width="14" height="72"/>
  </g>
  <line x1="22" y1="310" x2="258" y2="310" stroke="#2D2D40" stroke-width="1"/>

  <!-- Chart 3: TTFR (line) -->
  <rect x="14" y="330" width="252" height="80" rx="10" fill="#191926"/>
  <text x="258" y="348" text-anchor="end" fill="#E5E7EB" font-family="system-ui" font-size="11" font-weight="700">זמן לתגובה (דק)</text>
  <text x="22" y="348" fill="#F59E0B" font-family="system-ui" font-size="12" font-weight="700">14'</text>
  <polyline points="24,390 50,382 76,376 102,384 128,370 154,380 180,368 206,372 232,364 258,368" fill="none" stroke="#F59E0B" stroke-width="2"/>

  <!-- Chart 4: Rating (line) -->
  <rect x="14" y="420" width="252" height="80" rx="10" fill="#191926"/>
  <text x="258" y="438" text-anchor="end" fill="#E5E7EB" font-family="system-ui" font-size="11" font-weight="700">דירוג ממוצע</text>
  <text x="22" y="438" fill="#EC4899" font-family="system-ui" font-size="12" font-weight="700">4.6</text>
  <polyline points="24,478 50,474 76,470 102,466 128,472 154,468 180,464 206,462 232,460 258,458" fill="none" stroke="#EC4899" stroke-width="2"/>
</svg>
