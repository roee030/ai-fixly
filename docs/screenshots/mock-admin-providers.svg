<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 520" direction="rtl">
  <rect width="280" height="520" fill="#0F0F1A"/>

  <!-- Header -->
  <rect x="0" y="0" width="280" height="44" fill="#141421"/>
  <text x="260" y="28" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="14" font-weight="700">📊 לוח בקרה</text>

  <!-- Tabs -->
  <rect x="0" y="44" width="280" height="36" fill="#0F0F1A"/>
  <rect x="14" y="52" width="54" height="20" rx="10" fill="#191926"/>
  <text x="41" y="66" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="10">סקירה</text>
  <rect x="74" y="52" width="54" height="20" rx="10" fill="#191926"/>
  <text x="101" y="66" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="10">בקשות</text>
  <rect x="134" y="52" width="54" height="20" rx="10" fill="rgba(99,102,241,0.2)"/>
  <text x="161" y="66" text-anchor="middle" fill="#6366F1" font-family="system-ui" font-size="10" font-weight="700">ספקים</text>

  <!-- Summary cards -->
  <g transform="translate(14, 92)">
    <rect x="0" y="0" width="80" height="58" rx="10" fill="#191926"/>
    <text x="40" y="28" text-anchor="middle" fill="#FFF" font-family="system-ui" font-size="18" font-weight="700">18</text>
    <text x="40" y="46" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="8">ספקים פעילים</text>

    <rect x="86" y="0" width="80" height="58" rx="10" fill="#191926"/>
    <text x="126" y="28" text-anchor="middle" fill="#22C55E" font-family="system-ui" font-size="18" font-weight="700">64%</text>
    <text x="126" y="46" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="8">אחוז מענה</text>

    <rect x="172" y="0" width="80" height="58" rx="10" fill="#191926"/>
    <text x="212" y="28" text-anchor="middle" fill="#F59E0B" font-family="system-ui" font-size="18" font-weight="700">4.4</text>
    <text x="212" y="46" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="8">דירוג ממוצע</text>
  </g>

  <!-- Section title -->
  <text x="258" y="178" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="13" font-weight="700">יחס הצעה-זכייה</text>

  <!-- Table header -->
  <rect x="14" y="188" width="252" height="24" fill="#191926"/>
  <text x="258" y="204" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="9" font-weight="700">ספק</text>
  <text x="168" y="204" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="9" font-weight="700">עיר</text>
  <text x="118" y="204" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="9" font-weight="700">זכייה</text>
  <text x="72" y="204" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="9" font-weight="700">⭐</text>
  <text x="30" y="204" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="9" font-weight="700">תגובה</text>

  <!-- Top 6 providers -->
  <g font-family="system-ui" font-size="10">
    <rect x="14" y="212" width="252" height="30" fill="#141421"/>
    <text x="258" y="231" text-anchor="end" fill="#E5E7EB">שלומי א.</text>
    <text x="168" y="231" text-anchor="end" fill="#9CA3AF">חדרה</text>
    <text x="118" y="231" text-anchor="end" fill="#FFF" font-weight="700">67%</text>
    <text x="72" y="231" text-anchor="end" fill="#22C55E">4.8</text>
    <text x="30" y="231" text-anchor="end" fill="#E5E7EB">12'</text>

    <rect x="14" y="242" width="252" height="30" fill="#141421"/>
    <text x="258" y="261" text-anchor="end" fill="#E5E7EB">יוסי כ.</text>
    <text x="168" y="261" text-anchor="end" fill="#9CA3AF">נתניה</text>
    <text x="118" y="261" text-anchor="end" fill="#FFF" font-weight="700">53%</text>
    <text x="72" y="261" text-anchor="end" fill="#22C55E">4.5</text>
    <text x="30" y="261" text-anchor="end" fill="#E5E7EB">25'</text>

    <rect x="14" y="272" width="252" height="30" fill="#141421"/>
    <text x="258" y="291" text-anchor="end" fill="#E5E7EB">מוחמד ח.</text>
    <text x="168" y="291" text-anchor="end" fill="#9CA3AF">חיפה</text>
    <text x="118" y="291" text-anchor="end" fill="#FFF" font-weight="700">58%</text>
    <text x="72" y="291" text-anchor="end" fill="#F59E0B">4.3</text>
    <text x="30" y="291" text-anchor="end" fill="#E5E7EB">35'</text>

    <rect x="14" y="302" width="252" height="30" fill="#141421"/>
    <text x="258" y="321" text-anchor="end" fill="#E5E7EB">אלכס ר.</text>
    <text x="168" y="321" text-anchor="end" fill="#9CA3AF">רמת גן</text>
    <text x="118" y="321" text-anchor="end" fill="#FFF" font-weight="700">40%</text>
    <text x="72" y="321" text-anchor="end" fill="#F59E0B">3.9</text>
    <text x="30" y="321" text-anchor="end" fill="#E5E7EB">48'</text>

    <rect x="14" y="332" width="252" height="30" fill="#141421"/>
    <text x="258" y="351" text-anchor="end" fill="#E5E7EB">חיים ב.</text>
    <text x="168" y="351" text-anchor="end" fill="#9CA3AF">תל אביב</text>
    <text x="118" y="351" text-anchor="end" fill="#FFF" font-weight="700">71%</text>
    <text x="72" y="351" text-anchor="end" fill="#22C55E">4.7</text>
    <text x="30" y="351" text-anchor="end" fill="#E5E7EB">8'</text>

    <!-- Red tint: low perf -->
    <rect x="14" y="362" width="252" height="30" fill="rgba(239,68,68,0.08)"/>
    <text x="258" y="381" text-anchor="end" fill="#E5E7EB">דוד מ.</text>
    <text x="168" y="381" text-anchor="end" fill="#9CA3AF">נתניה</text>
    <text x="118" y="381" text-anchor="end" fill="#EF4444" font-weight="700">25%</text>
    <text x="72" y="381" text-anchor="end" fill="#EF4444">2.5</text>
    <text x="30" y="381" text-anchor="end" fill="#EF4444">2h</text>

    <rect x="14" y="392" width="252" height="30" fill="rgba(239,68,68,0.08)"/>
    <text x="258" y="411" text-anchor="end" fill="#E5E7EB">ויקטור ג.</text>
    <text x="168" y="411" text-anchor="end" fill="#9CA3AF">חדרה</text>
    <text x="118" y="411" text-anchor="end" fill="#EF4444" font-weight="700">20%</text>
    <text x="72" y="411" text-anchor="end" fill="#6B7280">—</text>
    <text x="30" y="411" text-anchor="end" fill="#EF4444">3h</text>
  </g>

  <!-- Hint: rows clickable -->
  <text x="140" y="460" text-anchor="middle" fill="#6B7280" font-family="system-ui" font-size="10" font-style="italic">לחץ על שורה לפרטי ספק</text>
</svg>
