<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 520" direction="rtl">
  <rect width="280" height="520" fill="#0F0F1A"/>

  <!-- Header -->
  <rect x="0" y="0" width="280" height="44" fill="#141421"/>
  <text x="260" y="28" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="14" font-weight="700">📊 לוח בקרה</text>

  <!-- Tabs -->
  <rect x="0" y="44" width="280" height="36" fill="#0F0F1A"/>
  <rect x="14" y="52" width="54" height="20" rx="10" fill="#191926"/>
  <text x="41" y="66" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="10">סקירה</text>
  <rect x="74" y="52" width="54" height="20" rx="10" fill="#191926"/>
  <text x="101" y="66" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="10">בקשות</text>
  <rect x="134" y="52" width="54" height="20" rx="10" fill="rgba(99,102,241,0.2)"/>
  <text x="161" y="66" text-anchor="middle" fill="#6366F1" font-family="system-ui" font-size="10" font-weight="700">משפך</text>

  <!-- 4 KPI cards in 2x2 grid -->
  <g transform="translate(14, 92)">
    <rect x="0" y="0" width="122" height="64" rx="10" fill="#191926"/>
    <text x="61" y="30" text-anchor="middle" fill="#FFF" font-family="system-ui" font-size="22" font-weight="700">89</text>
    <text x="61" y="52" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="9">בקשות (30 יום)</text>

    <rect x="130" y="0" width="122" height="64" rx="10" fill="#191926"/>
    <text x="191" y="30" text-anchor="middle" fill="#FFF" font-family="system-ui" font-size="22" font-weight="700">22</text>
    <text x="191" y="52" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="9">ביקורות שהוגשו</text>

    <rect x="0" y="70" width="122" height="64" rx="10" fill="#191926"/>
    <text x="61" y="100" text-anchor="middle" fill="#F59E0B" font-family="system-ui" font-size="22" font-weight="700">25%</text>
    <text x="61" y="122" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="9">המרה לביקורת</text>

    <rect x="130" y="70" width="122" height="64" rx="10" fill="#191926"/>
    <text x="191" y="100" text-anchor="middle" fill="#6366F1" font-family="system-ui" font-size="18" font-weight="700">14'</text>
    <text x="191" y="122" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="9">זמן לתגובה</text>
  </g>

  <!-- Section: funnel table -->
  <text x="258" y="260" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="13" font-weight="700">שלבי המשפך</text>

  <!-- Funnel rows (visualized as shrinking bars + counts) -->
  <g font-family="system-ui" font-size="11" transform="translate(14, 274)">
    <rect x="0" y="0" width="252" height="36" rx="8" fill="#191926"/>
    <rect x="4" y="4" width="244" height="28" rx="6" fill="rgba(99,102,241,0.30)"/>
    <text x="246" y="22" text-anchor="end" fill="#FFF" font-weight="700">בקשה נוצרה</text>
    <text x="10" y="22" fill="#FFF" font-weight="700">89 · 100%</text>

    <rect x="0" y="42" width="252" height="36" rx="8" fill="#191926"/>
    <rect x="4" y="46" width="64" height="28" rx="6" fill="rgba(99,102,241,0.30)"/>
    <text x="246" y="64" text-anchor="end" fill="#FFF" font-weight="600">ביקורת הוגשה</text>
    <text x="10" y="64" fill="#FFF" font-weight="700">22 · 25%</text>
  </g>

  <!-- TBD info box -->
  <rect x="14" y="362" width="252" height="58" rx="8" fill="rgba(100,116,139,0.1)"/>
  <text x="258" y="384" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="10">שלבי משפך עמוקים (פתיחה → צילום → הגשה)</text>
  <text x="258" y="400" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="10">יתווספו כשנצבור session_logs ב-rollup.</text>
  <text x="258" y="414" text-anchor="end" fill="#6B7280" font-family="system-ui" font-size="9" font-style="italic">[TBD]</text>

  <!-- Revenue big stat -->
  <text x="258" y="448" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="13" font-weight="700">הכנסות ברוטו (30 יום)</text>
  <rect x="14" y="458" width="252" height="50" rx="10" fill="#191926"/>
  <text x="140" y="490" text-anchor="middle" fill="#22C55E" font-family="system-ui" font-size="26" font-weight="700">₪12,450</text>
</svg>
