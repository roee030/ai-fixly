<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F0F1A"/>
      <stop offset="1" stop-color="#141421"/>
    </linearGradient>
  </defs>
  <rect width="280" height="520" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="16" y="16" width="248" height="64" rx="12" fill="#191926"/>
  <text x="260" y="40" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="14" font-weight="700">שלום, שלומי</text>
  <rect x="180" y="52" width="80" height="20" rx="10" fill="rgba(99,102,241,0.15)"/>
  <text x="220" y="66" text-anchor="middle" fill="#6366F1" font-family="system-ui" font-size="10" font-weight="700">אינסטלטור</text>

  <!-- Vacation toggle -->
  <rect x="16" y="96" width="248" height="48" rx="10" fill="#191926"/>
  <text x="260" y="119" text-anchor="end" fill="#E5E7EB" font-family="system-ui" font-size="12" font-weight="600">מצב חופשה</text>
  <text x="260" y="134" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="9">לא מקבל הצעות חדשות</text>
  <rect x="24" y="112" width="36" height="20" rx="10" fill="#22C55E"/>
  <circle cx="50" cy="122" r="7" fill="#FFF"/>

  <!-- 3 Stat cards -->
  <g transform="translate(16, 160)">
    <rect x="0" y="0" width="76" height="68" rx="10" fill="#191926"/>
    <text x="38" y="28" text-anchor="middle" fill="#FFF" font-family="system-ui" font-size="20" font-weight="700">12</text>
    <text x="38" y="48" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="9">הצעות החודש</text>

    <rect x="86" y="0" width="76" height="68" rx="10" fill="#191926"/>
    <text x="124" y="28" text-anchor="middle" fill="#22C55E" font-family="system-ui" font-size="20" font-weight="700">8</text>
    <text x="124" y="48" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="9">עבודות שבוצעו</text>

    <rect x="172" y="0" width="76" height="68" rx="10" fill="#191926"/>
    <text x="210" y="28" text-anchor="middle" fill="#F59E0B" font-family="system-ui" font-size="20" font-weight="700">67%</text>
    <text x="210" y="48" text-anchor="middle" fill="#9CA3AF" font-family="system-ui" font-size="9">אחוז זכייה</text>
  </g>

  <!-- Bids history header -->
  <text x="260" y="258" text-anchor="end" fill="#E5E7EB" font-family="system-ui" font-size="13" font-weight="700">היסטוריית הצעות</text>

  <!-- Bid rows -->
  <g transform="translate(16, 272)">
    <rect x="0" y="0" width="248" height="56" rx="10" fill="#191926"/>
    <text x="240" y="20" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="11" font-weight="700">צינור דולף במטבח</text>
    <text x="240" y="36" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="9">חדרה · ₪350</text>
    <rect x="8" y="18" width="52" height="18" rx="9" fill="rgba(34,197,94,0.2)"/>
    <text x="34" y="30" text-anchor="middle" fill="#22C55E" font-family="system-ui" font-size="9" font-weight="700">נבחר</text>

    <rect x="0" y="64" width="248" height="56" rx="10" fill="#191926"/>
    <text x="240" y="84" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="11" font-weight="700">דוד שמש לא מחמם</text>
    <text x="240" y="100" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="9">נתניה · ₪420</text>
    <rect x="8" y="82" width="52" height="18" rx="9" fill="rgba(245,158,11,0.2)"/>
    <text x="34" y="94" text-anchor="middle" fill="#F59E0B" font-family="system-ui" font-size="9" font-weight="700">נשלח</text>

    <rect x="0" y="128" width="248" height="56" rx="10" fill="#191926"/>
    <text x="240" y="148" text-anchor="end" fill="#FFF" font-family="system-ui" font-size="11" font-weight="700">החלפת ברז במקלחת</text>
    <text x="240" y="164" text-anchor="end" fill="#9CA3AF" font-family="system-ui" font-size="9">רעננה · ₪280</text>
    <rect x="8" y="146" width="64" height="18" rx="9" fill="rgba(148,163,184,0.2)"/>
    <text x="40" y="158" text-anchor="middle" fill="#94A3B8" font-family="system-ui" font-size="9" font-weight="700">לא נבחר</text>
  </g>

  <!-- Tab bar hint -->
  <rect x="0" y="480" width="280" height="40" fill="#0B0B15"/>
  <circle cx="140" cy="500" r="16" fill="#6366F1"/>
</svg>
